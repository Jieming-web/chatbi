version: "3.8"

services:
  chatbi-frontend:
    build: .
    container_name: chatbi-frontend
    ports:
      - "8501:8501"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-placeholder}
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/Ecommerce.db:/app/Ecommerce.db:ro
      - ./chatbi_audit.log:/app/chatbi_audit.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chatbi-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - chatbi-frontend
    networks:
      - chatbi-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  chatbi-network:
    driver: bridge
